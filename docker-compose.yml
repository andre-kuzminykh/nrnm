services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HEALTH_PORT:-8003}:${HEALTH_PORT:-8003}"
    volumes:
      - bot-data:/app/data-persist
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import os, urllib.request
          port = os.environ.get("HEALTH_PORT", "8003")
          urllib.request.urlopen(f"http://127.0.0.1:{port}/health", timeout=3).read()
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  bot-data:
